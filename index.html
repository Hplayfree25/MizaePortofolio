<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revaldo Anjennu Rillif Anderson - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="public/favicon.png">
    <link rel="stylesheet" href="sty.css">
    <link rel="preload" href="public/prf.webp" as="image">
    <script>
        tailwind.config = {
            theme: {

                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                }
            }
        }

<body class="antialiased selection:bg-blue-200 selection:text-blue-900 relative">
<nav id="main-nav" class="site-nav fixed inset-x-0 top-0 z-50 px-3 pt-3 sm:px-6 lg:px-10">
    <div class="nav-shell mx-auto w-full max-w-7xl overflow-hidden rounded-[1.35rem] transition-all duration-300 md:bg-transparent md:border-none md:shadow-none md:backdrop-blur-none bg-zinc-100 border border-zinc-200/50 shadow-[0_10px_30px_rgba(0,0,0,0.03)]">
        <div class="flex min-h-16 items-center justify-between gap-3 px-4 sm:px-6">
            <div class="flex items-center">
                <div class="flex items-center gap-2 select-none" id="lang-toggle-wrapper">
                    <a href="?lang=id" id="lang-btn-id" class="lang-label text-[11px] font-black tracking-widest transition-colors duration-300 text-zinc-400 hover:text-zinc-800">ID</a>
                    <button type="button" class="lang-switch-btn relative w-12 h-7 rounded-full border border-zinc-200 bg-zinc-100/50 transition-colors duration-300 focus:outline-none flex items-center px-0.5" id="lang-toggle-btn" aria-label="Toggle Language">
                        <span class="lang-switch-handle w-5.5 h-5.5 rounded-full bg-zinc-800 flex items-center justify-center text-white transform" id="lang-handle">
                            <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20M12 2a14.5 14.5 0 0 1 0 20M2 12h20"></path>
                            </svg>
                        </span>
                    </button>
                    <a href="?lang=en" id="lang-btn-en" class="lang-label text-[11px] font-black tracking-widest transition-colors duration-300 text-zinc-400 hover:text-zinc-800">EN</a>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="nav-desktop hidden items-center gap-3 md:flex">
                    <div class="nav-links relative flex items-center gap-1 bg-transparent p-0" data-nav-links>
                        <span class="nav-cursor opacity-0" data-nav-cursor></span>
                        <a href="#hr" class="nav-link rounded-full px-5 py-2.5 text-[11px] font-black uppercase tracking-widest text-zinc-500 transition-all duration-300" data-nav-link id="nav-link-home">Home</a>
                        <a href="#sk" class="nav-link rounded-full px-5 py-2.5 text-[11px] font-black uppercase tracking-widest text-zinc-500 transition-all duration-300" data-nav-link id="nav-link-skills">About me</a>
                    </div>
                </div>

                <button type="button" class="nav-toggle group relative z-20 flex h-11 w-11 shrink-0 items-center justify-center transition-all duration-300 md:hidden" data-nav-toggle aria-label="Menu" aria-expanded="false" style="background-color: rgb(250, 247, 243); border-radius: 8px;">
                    <div class="nav-toggle-icon">
                        <span class="line-1"></span>
                        <span class="line-2"></span>
                        <span class="line-3"></span>
                    </div>
                </button>
            </div>
        </div>

        <div class="nav-mobile overflow-hidden opacity-0 pointer-events-none md:hidden h-0" data-nav-panel>
            <div class="px-6 pb-6 pt-3 flex flex-col gap-4 items-center">
                <a href="#hr" class="nav-link rounded-full px-6 py-3 text-lg font-bold transition-all duration-300" data-nav-link id="nav-link-mobile-home">Home</a>
                <a href="#sk" class="nav-link rounded-full px-6 py-3 text-lg font-bold transition-all duration-300" data-nav-link id="nav-link-mobile-skills">About me</a>
            </div>
        </div>
    </div>
</nav>

<section id="hr" class="hero-shell relative min-h-screen flex flex-col justify-between overflow-hidden py-10 px-4 sm:px-6 md:px-10 lg:px-24">
    <div class="hero-grid absolute inset-0 pointer-events-none"></div>

    <div class="relative z-10 w-full flex justify-center mt-12 sm:mt-16 pointer-events-none">
        <svg class="h-10 w-auto text-zinc-400 opacity-60" viewBox="0 0 100 30" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M10,20 Q25,5 40,20 T70,20 T90,10" />
        </svg>
    </div>

    <div class="relative z-10 w-full flex-grow flex flex-col justify-center items-center py-10">
        <div class="w-full flex flex-col md:flex-row items-center justify-between gap-6 md:gap-0 pointer-events-none">
            <div class="flex-1 w-full md:w-auto flex items-center gap-4">
                <div class="h-px bg-zinc-200/80 flex-1 hidden md:block"></div>
                <span id="hero-sub-left" class="text-xs md:text-sm font-bold uppercase tracking-wider text-zinc-500 whitespace-nowrap text-center md:text-left w-full md:w-auto"></span>
            </div>

            <div class="mx-0 md:mx-12 lg:mx-20 flex flex-col items-center justify-center min-w-0 md:min-w-[22rem] lg:min-w-[32rem] shrink-0">
                <div class="hero-title-wrapper pointer-events-auto cursor-default w-full">
                    <h1 class="hero-title text-center font-black leading-[0.85] tracking-tight text-zinc-800 uppercase select-none pointer-events-none">
                        <span id="hero-title-2-a" class="hero-name block whitespace-nowrap"></span>
                        <span id="hero-title-2-b" class="hero-name block whitespace-nowrap"></span>
                    </h1>
                </div>
            </div>

            <div class="flex-1 w-full md:w-auto flex items-center gap-4">
                <span id="hero-sub-right" class="text-xs md:text-sm font-bold uppercase tracking-wider text-zinc-500 whitespace-nowrap text-center md:text-right w-full md:w-auto"></span>
                <div class="h-px bg-zinc-200/80 flex-1 hidden md:block"></div>
            </div>
        </div>
    </div>

    <div class="relative z-10 w-full flex justify-center pb-4">
        <a href="#sk" class="hero-scroll flex h-12 w-12 items-center justify-center rounded-full border border-zinc-200 bg-white/90 text-zinc-500 shadow-sm transition duration-300 hover:-translate-y-1 hover:border-blue-600 hover:text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 focus:ring-offset-white" aria-label="Scroll">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v14m0 0l-6-6m6 6l6-6"></path>
            </svg>
        </a>
    </div>
</section>


<section id="sk" class="relative z-10 mx-auto max-w-7xl px-6 py-24 sm:px-10 lg:px-20">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8 md:gap-12 items-center select-none">
        
        <div class="md:col-span-4 flex flex-col justify-between md:h-[450px] w-full text-left">
            <h2 class="about-title text-6xl font-black tracking-tight text-zinc-800 md:text-8xl">
                Hey!
            </h2>
            <p id="about-p1" class="about-p1 text-2xl md:text-3xl font-medium leading-[1.35] text-zinc-600 tracking-tight mt-6 md:mt-0">
            </p>
        </div>

        <div class="hidden md:flex md:col-span-4 justify-center items-end w-full">
            <div id="about-img-container" class="about-img-container w-full max-w-[420px] aspect-[3/4] relative flex items-end justify-center overflow-hidden">
                <img id="about-profile-img" src="public/prj.png" alt="Revaldo Anderson" class="w-full h-auto object-contain z-10 select-none pointer-events-none" style="mask-image: linear-gradient(to bottom, black 55%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%); object-position: bottom center;">
            </div>
        </div>

        <div class="md:col-span-4 flex flex-col justify-end md:h-[450px] w-full text-left">
            <p id="about-p2" class="about-p2 text-sm md:text-base font-normal leading-[1.7] text-zinc-500 mb-6 mt-4 md:mt-0">
            </p>
            <div>
                <a href="#pj" class="about-btn group inline-flex items-center gap-3 select-none" data-about-btn>
                    <span id="about-btn-text" class="text-sm font-bold text-zinc-500 transition-colors duration-300 group-hover:text-zinc-800 uppercase tracking-wider"></span>
                    <div class="about-btn-arrow flex h-10 w-10 shrink-0 items-center justify-center border border-zinc-200 text-zinc-500 relative overflow-hidden transition-colors duration-300 group-hover:border-zinc-800">
                        <div class="about-btn-fill absolute inset-0 bg-zinc-900"></div>
                        <svg class="h-4 w-4 relative z-10 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" data-about-arrow>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 19L19 5m0 0H9m10 0v10"></path>
                        </svg>
                    </div>
                </a>
            </div>
        </div>

    </div>
</section>

<section id="sk-quote" class="relative z-10 mx-auto max-w-5xl px-6 flex items-center justify-center min-h-screen">
    <div id="about-quote" class="text-left text-xl sm:text-2xl md:text-5xl font-normal tracking-normal leading-[1.5] max-w-4xl select-none">
        <span class="quote-phrase"></span>
        <span class="quote-phrase"></span>
        <span class="quote-phrase"></span>
        <span class="quote-phrase"></span>
        <span class="quote-phrase"></span>
        <span class="quote-phrase"></span>
    </div>
</section>



<footer id="interactive-footer" class="folder-footer w-full overflow-hidden px-4 pb-16 sm:px-6 lg:px-10">
    <div class="absolute right-0 bottom-0 top-0 w-full md:w-1/2 pointer-events-none flex items-center justify-center overflow-hidden opacity-[0.07]">
        <div class="grid grid-cols-4 gap-6 transform rotate-12 scale-125">
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-transparent border-4 border-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-transparent border-4 border-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-transparent border-4 border-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-transparent border-4 border-zinc-950 rounded-sm"></div>
            <div class="w-14 h-14 bg-zinc-950 rounded-sm"></div>
        </div>
    </div>

    <div class="mx-auto w-full max-w-7xl relative z-10">
        <div class="grid gap-10 p-6 sm:p-8 lg:grid-cols-[1.2fr_0.8fr_0.8fr] lg:p-10">
            <div class="max-w-xl flex flex-col gap-6">
                <svg class="h-16 w-16 text-zinc-950 shrink-0" fill="currentColor" viewBox="0 0 100 100">
                    <rect x="0" y="0" width="20" height="20" rx="2"/>
                    <rect x="25" y="0" width="20" height="20" rx="2"/>
                    <rect x="50" y="0" width="20" height="20" rx="2"/>
                    
                    <rect x="25" y="25" width="20" height="20" rx="2"/>
                    <rect x="75" y="25" width="20" height="20" rx="2"/>
                    
                    <rect x="0" y="50" width="20" height="20" rx="2"/>
                    <rect x="25" y="50" width="20" height="20" rx="2"/>
                    <rect x="50" y="50" width="20" height="20" rx="2"/>
                    
                    <rect x="50" y="75" width="20" height="20" rx="2"/>
                    <rect x="75" y="75" width="20" height="20" rx="2"/>
                </svg>
            </div>

            <div>
                <p class="footer-label">Navigation</p>
                <div class="mt-5 grid gap-3">
                    <a href="#hr" id="footer-nav-home" class="footer-link"></a>
                    <a href="#sk" id="footer-nav-skills" class="footer-link"></a>
                </div>
            </div>

            <div>
                <p class="footer-label">Contact</p>
                <div class="mt-5 grid gap-3">
                    <a href="" id="footer-email" class="footer-link truncate"></a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="footer-link">LinkedIn</a>
                    <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
                </div>
            </div>
        </div>

        <div class="mt-12 flex flex-col items-start justify-start py-2">
            <p id="footer-copyright" class="text-[9px] font-semibold uppercase tracking-wider text-zinc-900/40"></p>
        </div>
    </div>
</footer>

<div class="custom-dark-cursor fixed top-0 left-0 w-40 h-12 bg-white text-zinc-950 rounded-full flex flex-row items-center justify-center gap-2 px-4 opacity-0 scale-0 pointer-events-none z-50 shadow-2xl" data-dark-cursor>
    <span id="dark-cursor-label" class="text-[10px] font-black uppercase tracking-wider leading-none">View Project</span>
    <svg class="h-3.5 w-3.5 text-zinc-950 animate-arrow-ghost shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
    </svg>
</div>
